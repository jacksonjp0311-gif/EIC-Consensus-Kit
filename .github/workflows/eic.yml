name: EIC Consensus Gate

on:
  push:
  pull_request:

jobs:
  eic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install -e .[dev]

      - name: Test
        run: python -m pytest

      - name: Validate schema
        run: eicg validate-schema examples/valid_distributed_record.json

      - name: Evaluate continuity gate
        run: eicg evaluate examples/valid_distributed_record.json --profile standard --fail-under 0.85
